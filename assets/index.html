<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
</head>
<body>

    <!-- Contenedor General -->
    <div class="container">

        <!-- Header -->
        <header class="header">
            <div class="logo">
                <figure>
                    <img src="logo.png" alt="Logo de Mi Web">
                </figure>
                <h1>MI WEB</h1>
            </div>

            <nav class="navbar">
                <ul class="nav-list">
                    <li><a href="#">Inicio</a></li>
                    <li><a href="#">Características</a></li>
                    <li><a href="#">Contacto</a></li>
                </ul>
            </nav>

            <div class="login-button">
                <a href="#" class="btn btn-primary">Iniciar Sesión</a>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">

            <section class="form-section">

                <article class="form-card">

                    <header class="form-header">
                        <h2>Registro de Nuevo Usuario</h2>
                        <p>Completa tus datos para crear tu cuenta rápidamente</p>
                    </header>

                    <form action="#" method="post" class="register-form">

                        <!-- Nombre -->
                        <div class="form-group">
                            <label for="nombre">Nombres y Apellidos</label>
                            <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez" required>
                        </div>

                        <!-- Email -->
                        <div class="form-group">
                            <label for="email">Correo Electrónico</label>
                            <input type="email" id="email" name="email" placeholder="ejemplo@mail.com" required>
                        </div>

                        <!-- Teléfono -->
                        <div class="form-group">
                            <label for="telefono">Teléfono Móvil</label>
                            <input type="tel" id="telefono" name="telefono" placeholder="+52 (555) 599-9999">
                        </div>

                        <!-- Contraseña -->
                        <div class="form-group">
                            <label for="password">Contraseña</label>
                            <input type="password" id="password" name="password" placeholder="********" required>
                        </div>

                        <!-- Confirmar Contraseña -->
                        <div class="form-group">
                            <label for="confirmar">Confirmar Contraseña</label>
                            <input type="password" id="confirmar" name="confirmar" placeholder="********" required>
                        </div>

                        <!-- Botón -->
                        <div class="form-group">
                            <button type="submit" class="btn btn-submit">
                                Crear Cuenta
                            </button>
                        </div>

                    </form>

                    <footer class="form-footer">
                        <p>¿Ya tienes cuenta?
                            <a href="#">Inicia sesión aquí</a>
                        </p>
                    </footer>

                </article>

            </section>

        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 MI WEB - Todos los derechos reservados</p>
        </footer>

    </div>

</body>
</html>
